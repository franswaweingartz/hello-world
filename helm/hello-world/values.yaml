replicaCount: 1

image:
  repository: hello-world
  tag: "1.0"
  pullPolicy: Never

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 10
  readiness:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 10

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
